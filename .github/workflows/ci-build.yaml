name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: accounts
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          # Fix nose compatibility in CI
          sed -i 's/collections.Callable/collections.abc.Callable/g' $(python -c "import site; print(site.getsitepackages()[0])")/nose/suite.py
          sed -i 's/collections.Callable/collections.abc.Callable/g' $(python -c "import site; print(site.getsitepackages()[0])")/nose/case.py

      - name: Run Flake8 Linter
        run: |
          flake8 service

      - name: Run Unit Tests
        env:
          DATABASE_URI: postgresql://postgres:postgres@localhost:5432/accounts
        run: |
          nosetests -v
